name: Weekly SEO update

# Spúšťa sa:
# 1. každý pondelok 06:00 UTC (~08:00 SK letný čas)
# 2. manuálne cez Actions → Run workflow

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account credentials
        # GOOGLE_SA_JSON tajomstvo obsahuje celý service account JSON.
        # Zapíšeme ho do súboru a nastavíme GOOGLE_APPLICATION_CREDENTIALS.
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          if [[ -n "$GOOGLE_SA_JSON" ]]; then
            echo "$GOOGLE_SA_JSON" > /tmp/google-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google-sa.json" >> $GITHUB_ENV
          else
            echo "ℹ GOOGLE_SA_JSON nie je nastavený — generate_dashboard použije mock dáta"
          fi

      - name: Generate weekly dashboard
        continue-on-error: true
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_dashboard.py

      - name: Commit & push if data.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain data.json)" ]]; then
            echo "= data.json unchanged"
            exit 0
          fi
          git add data.json
          git commit -m "chore(seo): weekly auto-update [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin master && git push; then
              echo "✓ pushed (attempt $i)"
              exit 0
            fi
            echo "  push rejected, retry $i…"
            sleep 3
          done
          echo "::error::push failed after 3 retries"
          exit 1
